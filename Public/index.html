<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Chat using Websocket</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 200px; background: #2c3e50; color: white; padding: 20px; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #message-container { flex: 1; overflow-y: auto; padding: 20px; background: #f4f4f4; }
        #send-container { padding: 20px; display: flex; }
        #message-input { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Online Users</h3>
        <ul id="user-list"></ul>
    </div>
    <div id="chat-container">
        <div id="message-container"></div>
        <form id="send-container">
            <input type="text" id="message-input" placeholder="Type a message..." required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
